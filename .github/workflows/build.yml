name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend: [pasta, basta]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          ${{ matrix.backend == 'basta' && '-DALF_USE_BASTA=ON' || '' }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ./build/bin/alforno_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alforno-linux-${{ matrix.backend }}
          path: |
            build/libalforno.so
            build/libalforno.so.0
            build/libalforno.so.0.1.0

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend: [pasta, basta]
    steps:
      - uses: actions/checkout@v4

      - name: Configure (ASAN + UBSan)
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"
          ${{ matrix.backend == 'basta' && '-DALF_USE_BASTA=ON' || '' }}

      - name: Build
        run: cmake --build build

      - name: Test under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./build/bin/alforno_test

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        backend: [pasta, basta]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=arm64
          ${{ matrix.backend == 'basta' && '-DALF_USE_BASTA=ON' || '' }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ./build/bin/alforno_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alforno-macos-arm64-${{ matrix.backend }}
          path: |
            build/libalforno.dylib
            build/libalforno.0.dylib
            build/libalforno.0.1.0.dylib

  freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake git
          run: |
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
            ./build/bin/alforno_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alforno-freebsd-amd64
          path: |
            build/libalforno.so
            build/libalforno.so.0
            build/libalforno.so.0.1.0

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        backend: [pasta, basta]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          ${{ matrix.backend == 'basta' && '-DALF_USE_BASTA=ON' || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: |
          $env:PATH = "$PWD\build\bin\Release;" + $env:PATH
          .\build\bin\Release\alforno_test.exe
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alforno-windows-${{ matrix.backend }}
          path: |
            build/bin/Release/alforno.dll
            build/lib/Release/alforno.lib
